version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "github-actions"

  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "EPPlus"
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"  
    labels:
      - "dependencies"
      - "nuget"
